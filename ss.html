<!DOCTYPE html>
<html>
<head>
    <title>Eternal Seas Screenshots</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            min-height:100vh;
            padding:40px;

            background:linear-gradient(-45deg,#001018,#002b36,#003f5c,#001018);
            background-size:400% 400%;
            animation:oceanBG 12s ease infinite;
        }

        @keyframes oceanBG{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        h1{
            text-align:center;
            color:white;
            font-size:60px;
            text-shadow:0 0 20px cyan;
            margin-bottom:50px;
        }

        .gallery{
            max-width:1200px;
            margin:auto;

            display:flex;
            flex-direction:column;
            align-items:center;
            gap:40px;
        }

        .gallery img{
            width:90%;
            max-width:1000px;
            height:auto;

            border-radius:20px;
            border:2px solid cyan;

            box-shadow:
                0 0 15px cyan,
                0 0 30px cyan,
                0 0 60px cyan;

            transition:0.3s;
        }

        .gallery img:hover{
            transform:scale(1.03);

            box-shadow:
                0 0 25px cyan,
                0 0 50px cyan,
                0 0 100px cyan;
        }

        .back-btn{
            display:block;
            width:280px;
            margin:50px auto 0;
            padding:18px;

            text-align:center;
            color:white;
            text-decoration:none;
            font-size:22px;

            border:1px solid cyan;
            border-radius:14px;

            background:rgba(0,255,255,.08);
            box-shadow:0 0 15px cyan;

            transition:0.3s;
        }

        .back-btn:hover{
            transform:scale(1.05);
            box-shadow:0 0 30px cyan;
        }
    </style>
</head>

<body>

    <h1>🌊 Eternal Seas Screenshots</h1>

    <div class="gallery">
        <img src="image1.jpg" alt="Screenshot 1">
        <img src="image2.jpg" alt="Screenshot 2">
        <img src="image3.jpg" alt="Screenshot 3">
        <img src="image4.jpg" alt="Screenshot 4">
        <img src="image5.jpg" alt="Screenshot 5">
        <img src="image6.jpg" alt="Screenshot 6">
    </div>

    <a href="index.html" class="back-btn">⬅ Back to Home</a>

</body>
</html>
