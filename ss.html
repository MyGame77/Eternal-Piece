<!DOCTYPE html>
<html>
<head>
    <title>Eternal Seas screenshots</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            min-height:100vh;
            padding:40px;

            background:linear-gradient(-45deg,#001018,#002b36,#003f5c,#001018);
            background-size:400% 400%;
            animation:oceanBG 12s ease infinite;
        }

        @keyframes oceanBG{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        h1{
            text-align:center;
            color:white;
            font-size:60px;
            text-shadow:0 0 20px cyan;
            margin-bottom:40px;
        }

        .gallery{
            max-width:1400px;
            margin:auto;

            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:25px;
        }

        .gallery img{
            width:100%;
            height:250px;
            object-fit:cover;

            border-radius:15px;
            border:2px solid cyan;

            box-shadow:
            0 0 10px cyan,
            0 0 20px cyan,
            0 0 40px cyan;

            transition:.3s;
        }

        .gallery img:hover{
            transform:scale(1.05);

            box-shadow:
            0 0 20px cyan,
            0 0 40px cyan,
            0 0 80px cyan;
        }

        .back-btn{
            display:block;
            width:250px;
            margin:40px auto 0;
            padding:15px;

            text-align:center;
            color:white;
            text-decoration:none;

            border:1px solid cyan;
            border-radius:12px;

            background:rgba(0,255,255,.08);
            box-shadow:0 0 15px cyan;
        }
    </style>
</head>
<body>

    <h1>🌊 Eternal Seas screenshots</h1>

    <div class="gallery">
        <img src="image1.jpg">
        <img src="image2.jpg">
        <img src="image3.jpg">
        <img src="image4.jpg">
        <img src="image5.jpg">
        <img src="image6.jpg">
    </div>

    <a href="index.html" class="back-btn">Back to Home</a>

</body>
  </html>
